# frozen-guild.production.conf
# 1) Ajusta server_name y rutas de certificados.
# 2) Copia a /etc/nginx/sites-available/frozen-guild.
# 3) Enlaza en sites-enabled y recarga nginx.

server {
  listen 80;
  listen [::]:80;
  server_name frozen.example.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name frozen.example.com;

  root /var/www/frozen-guild/web/dist;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/frozen.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/frozen.example.com/privkey.pem;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location / {
    try_files $uri /index.html;
  }

  location /games/ {
    proxy_pass http://127.0.0.1:8000/games/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
  }

  location /socket.io/ {
    proxy_pass http://127.0.0.1:8000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
  }
}
